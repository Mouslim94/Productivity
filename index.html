<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productivité Vétérinaire & Athlète</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            redTask: '#ef4444',
            orangeTask: '#f97316',
            yellowTask: '#eab308',
            greenTask: '#22c55e',
            blueTask: '#3b82f6',
          }
        }
      }
    };
  </script>
  <style>
    :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; --border: #e2e8f0; }
    .dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; }
    body { background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.25rem; }
    .subcase { width: 48px; height: 48px; border: 2px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
    .subcase.done { border-color: transparent; color: #fff; }
    .subcase.done.redTask { background: #ef4444; }
    .subcase.done.orangeTask { background: #f97316; }
    .subcase.done.yellowTask { background: #eab308; color: #0f172a; }
    .subcase.done.greenTask { background: #22c55e; }
    .subcase.done.blueTask { background: #3b82f6; }
    .dark .subcase:not(.done) { color: #f1f5f9; }
    .dark .subcase.done.yellowTask { color: #0f172a; }
    .tab-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .tab-btn.active { background: #3b82f6; color: #fff; }
    .tab-btn:not(.active):hover { background: var(--border); }
    .btn-primary { background: #3b82f6; color: #fff; padding: 0.5rem 1.25rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; border: none; transition: background 0.2s; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: #fff; padding: 0.5rem 1.25rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #22c55e; color: #fff; padding: 0.5rem 1.25rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-success:hover { background: #16a34a; }
    input, select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem 0.75rem; outline: none; }
    input:focus, select:focus { border-color: #3b82f6; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--border); margin-bottom: 0.5rem; transition: background 0.2s; }
    .checkbox-main { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .checkbox-main.done { background: currentColor; border-color: transparent; }
    .checkbox-main svg { display: none; }
    .checkbox-main.done svg { display: block; }
    .chart-container { position: relative; height: 220px; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-orange { background: #ffedd5; color: #9a3412; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .progress-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .hidden { display: none !important; }
    .cal-day { width: 40px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 0.5rem; cursor: pointer; border: 1px solid var(--border); }
    .cal-day.active { background: #3b82f6; color: white; border-color: #3b82f6; }
  </style>

  <script>
    const firebaseConfig = { apiKey: "VOTRE_API_KEY", authDomain: "VOTRE_AUTH_DOMAIN", projectId: "VOTRE_PROJECT_ID", storageBucket: "VOTRE_STORAGE_BUCKET", messagingSenderId: "VOTRE_MESSAGING_SENDER_ID", appId: "VOTRE_APP_ID" };
    let db = null;
    try { if (firebaseConfig.apiKey !== "VOTRE_API_KEY") { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); } } catch (e) { console.error(e); }

    const TYPE_ORDER = ['red', 'orange', 'yellow', 'green', 'blue'];
    const TYPE_LABELS = { red: 'Unique/RDV', orange: 'Mensuelle', yellow: 'Hebdomadaire', green: 'Quotidienne', blue: 'Flottante' };
    const TYPE_COLORS = { red: '#ef4444', orange: '#f97316', yellow: '#eab308', green: '#22c55e', blue: '#3b82f6' };
    const TYPE_CLASSES = { red: 'redTask', orange: 'orangeTask', yellow: 'yellowTask', green: 'greenTask', blue: 'blueTask' };
    const TYPE_BADGES = { red: 'badge-red', orange: 'badge-orange', yellow: 'badge-yellow', green: 'badge-green', blue: 'badge-blue' };

    let tasks = [];
    let sleepData = [];
    let napData = [];
    let sportData = [];
    let sportQuota = 4;
    let taskHistory = {};
    let chartInstances = {};
    let selectedDate = getTodayStr();

    function getTodayStr() { return new Date().toISOString().split('T')[0]; }
    function getWeekStartStr(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff)).toISOString().split('T')[0];
    }
    function getWeekNumber(dateStr) {
      const d = new Date(dateStr); d.setHours(0,0,0,0); d.setDate(d.getDate() + 4 - (d.getDay() || 7));
      return Math.ceil((((d - new Date(d.getFullYear(),0,1)) / 86400000) + 1) / 7);
    }
    function formatDateFr(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function getDayNameFr(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('fr-FR', { weekday: 'short' });
    }
    function sleepDuration(bed, wake) {
      let b = bed.split(':').map(Number), w = wake.split(':').map(Number);
      let bM = b[0]*60 + b[1], wM = w[0]*60 + w[1];
      if (wM < bM) wM += 1440;
      return (wM - bM) / 60;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const target = document.querySelector(`[data-tab="${tab}"]`);
      if (target) target.classList.add('active');
      ['tasks','dashboard','archives'].forEach(t => document.getElementById('tab-' + t)?.classList.add('hidden'));
      document.getElementById('tab-' + tab)?.classList.remove('hidden');
      if (tab === 'dashboard') setTimeout(initCharts, 50);
      if (tab === 'archives') renderArchives();
    }

    function renderCalendar() {
      const calContainer = document.getElementById('calendarTimeline');
      if (!calContainer) return;
      calContainer.innerHTML = '';
      
      let start = new Date(getWeekStartStr(selectedDate));
      for (let i = 0; i < 7; i++) {
        let current = new Date(start);
        current.setDate(start.getDate() + i);
        let cStr = current.toISOString().split('T')[0];
        let activeClass = (cStr === selectedDate) ? 'cal-day active' : 'cal-day';
        
        let dayBox = document.createElement('div');
        dayBox.className = activeClass;
        dayBox.onclick = () => { selectedDate = cStr; renderCalendar(); renderTasks(); };
        dayBox.innerHTML = `
          <span class="text-xs uppercase opacity-70">${getDayNameFr(cStr)}</span>
          <span class="text-base font-bold">${current.getDate()}</span>
        `;
        calContainer.appendChild(dayBox);
      }
      document.getElementById('calendarTitle').textContent = formatDateFr(selectedDate) + " (S" + getWeekNumber(selectedDate) + ")";
    }

    function renderTasks() {
      const container = document.getElementById('taskList');
      if (!container) return;
      container.innerHTML = '';

      // Historique rétroactif si le jour sélectionné est dans le passé
      if (selectedDate < getTodayStr() && taskHistory[selectedDate]) {
        renderHistoryDay(container, taskHistory[selectedDate]);
        return;
      }

      const activeTasks = tasks.filter(t => {
        if (t.type === 'red') return t.date === selectedDate;
        if (t.type === 'green') return true;
        
        if (t.type === 'yellow') {
          // Gestion du quota hebdo dynamique
          const doneThisWeek = sportData.filter(d => getWeekStartStr(d.date) === getWeekStartStr(selectedDate) && d.done && d.taskId === t.id).length;
          if (t.quota && doneThisWeek >= t.quota) return false; // Masqué si quota atteint
          return true;
        }
        
        if (t.type === 'orange') {
          // Filtrage par jour spécifique musulman (ex: lundi/jeudi) ou quota mensuel
          if (t.specificDay && t.specificDay !== 'all') {
            const currentDayName = new Date(selectedDate + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
            if (currentDayName !== t.specificDay) return false;
          }
          const doneThisMonth = sportData.filter(d => d.date.slice(0,7) === selectedDate.slice(0,7) && d.done && d.taskId === t.id).length;
          if (t.quota && doneThisMonth >= t.quota) return false; // Masqué si quota mensuel atteint
          return true;
        }
        return !t.completed;
      });

      if (activeTasks.length === 0) {
        container.innerHTML = `<div class="card text-center text-slate-400">Aucune tâche active pour ce jour.</div>`;
        return;
      }

      activeTasks.sort((a,b) => TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type)).forEach(task => {
        const isComplex = task.subcases && task.subcases.length > 0;
        const el = document.createElement('div');
        el.className = 'task-item card';
        el.style.borderLeft = '4px solid ' + TYPE_COLORS[task.type];

        let subHtml = '';
        if (isComplex) {
          subHtml = '<div class="flex gap-2 flex-wrap mt-2">' + task.subcases.map((s, idx) => {
            return `<div class="subcase ${s.done ? 'done ' + TYPE_CLASSES[task.type] : ''}" onclick="toggleSubcase('${task.id}', ${idx})">${s.name}</div>`;
          }).join('') + '</div>';
        }

        let quotaInfo = '';
        if (task.quota) {
          const doneCount = sportData.filter(d => d.taskId === task.id && (task.type === 'yellow' ? getWeekStartStr(d.date) === getWeekStartStr(selectedDate) : d.date.slice(0,7) === selectedDate.slice(0,7))).length;
          quotaInfo = `<span class="text-xs font-bold ml-2">📊 ${doneCount}/${task.quota}</span>`;
        }

        el.innerHTML = `
          <div class="checkbox-main ${task.completed && !isComplex ? 'done' : ''}" style="color:${TYPE_COLORS[task.type]}" onclick="toggleTask('${task.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-semibold">${task.name}</span>
              <span class="badge ${TYPE_BADGES[task.type]}">${TYPE_LABELS[task.type]}</span>
              ${quotaInfo}
            </div>
            ${subHtml}
          </div>
          <button onclick="deleteTask('${task.id}')">🗑️</button>
        `;
        container.appendChild(el);
      });
    }

    function renderHistoryDay(container, dayHist) {
      Object.values(dayHist).forEach(h => {
        const el = document.createElement('div');
        el.className = 'task-item card opacity-70';
        el.style.borderLeft = '4px solid ' + TYPE_COLORS[h.type];
        el.innerHTML = `
          <div class="checkbox-main done" style="color:${TYPE_COLORS[h.type]}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <span class="font-semibold line-through">${h.name}</span>
            <span class="badge ${TYPE_BADGES[h.type]}">${TYPE_LABELS[h.type]}</span>
            <span class="text-xs block text-slate-400">Validé à ${h.pct}% ce jour-là</span>
          </div>
        `;
        container.appendChild(el);
      });
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      if (task.quota) {
        // Enregistre une occurrence de quota accomplie
        sportData.push({ date: selectedDate, done: true, taskId: task.id });
        syncData("metrics", "sport", sportData);
        recordTaskHistory(task);
        renderTasks();
        return;
      }
      if (task.subcases) return;
      task.completed = !task.completed;
      saveAndRefresh();
    }

    function toggleSubcase(taskId, subIdx) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      task.subcases[subIdx].done = !task.subcases[subIdx].done;
      task.completed = task.subcases.every(s => s.done);
      saveAndRefresh();
    }

    function recordTaskHistory(task) {
      if (!taskHistory[selectedDate]) taskHistory[selectedDate] = {};
      const total = task.subcases ? task.subcases.length : 1;
      const done = task.subcases ? task.subcases.filter(s => s.done).length : 1;
      taskHistory[selectedDate][task.id] = { name: task.name, type: task.type, pct: Math.round((done/total)*100) };
      syncData("metrics", "history", taskHistory);
    }

    function openTaskModal() {
      document.getElementById('taskModal').classList.add('open');
    }
    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('open');
    }
    function onTypeChange() {
      const type = document.getElementById('taskType').value;
      document.getElementById('quotaField').classList.toggle('hidden', !['yellow', 'orange'].includes(type));
      document.getElementById('daySelectionField').classList.toggle('hidden', type !== 'orange');
    }

    function saveTask() {
      const name = document.getElementById('taskName').value.trim();
      const type = document.getElementById('taskType').value;
      const quota = parseInt(document.getElementById('taskQuotaValue').value) || null;
      const specificDay = document.getElementById('taskSpecificDay').value;
      const structure = document.getElementById('taskStructure').value;
      const subcasesVal = document.getElementById('subcaseNames').value;

      if (!name) return;

      let subcases = null;
      if (structure === 'complex' && subcasesVal) {
        subcases = subcasesVal.split(',').map(s => ({ name: s.trim(), done: false }));
      }

      const newTask = {
        id: 'task_' + Date.now(),
        name, type, quota, specificDay, subcases,
        completed: false, date: selectedDate
      };

      tasks.push(newTask);
      if (!db) localStorage.setItem('prod_tasks', JSON.stringify(tasks));
      else db.collection("tasks").doc(newTask.id).set(newTask);

      closeTaskModal();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveAndRefresh();
    }

    function saveAndRefresh() {
      if (!db) localStorage.setItem('prod_tasks', JSON.stringify(tasks));
      renderTasks();
    }

    // GESTION DU SOMMEIL (AVEC BLOCAGE DE DOUBLONS)
    function addSleep() {
      const bed = document.getElementById('bedTime').value;
      const wake = document.getElementById('wakeTime').value;
      if (!bed || !wake) return;

      // Éviter les doublons : on nettoie l'enregistrement existant du même jour s'il existe
      sleepData = sleepData.filter(d => d.date !== selectedDate);

      sleepData.push({ date: selectedDate, bed, wake, duration: sleepDuration(bed, wake) });
      syncData("metrics", "sleep", sleepData);
      initCharts();
    }

    function addNap() {
      const start = document.getElementById('napStart').value;
      const duration = parseInt(document.getElementById('napDuration').value);
      if (!start || !duration) return;

      // Éviter les doublons de sieste sur la même heure/jour
      napData = napData.filter(d => !(d.date === selectedDate && d.start === start));

      napData.push({ date: selectedDate, start, duration });
      syncData("metrics", "naps", napData);
      initCharts();
    }

    function deleteMetric(type, index) {
      if (type === 'sleep') sleepData.splice(index, 1);
      if (type === 'nap') napData.splice(index, 1);
      if (type === 'sport') sportData.splice(index, 1);
      
      syncData("metrics", type, type === 'sleep' ? sleepData : type === 'nap' ? napData : sportData);
      initCharts();
    }

    function syncData(col, doc, data) {
      if (db) db.collection(col).doc(doc).set({ list: data });
      else localStorage.setItem('prod_' + doc, JSON.stringify(data));
    }

    function initCharts() {
      // Affichage des moyennes textuelles
      if (sleepData.length > 0) {
        let avg = sleepData.reduce((a,b) => a+b.duration, 0) / sleepData.length;
        document.getElementById('avgSleepDuration').textContent = avg.toFixed(1) + 'h';
      }
      if (napData.length > 0) {
        let avg = napData.reduce((a,b) => a+b.duration, 0) / napData.length;
        document.getElementById('avgNapDuration').textContent = Math.round(avg) + 'm';
      }

      // Graphique Sommeil
      let ctxSleep = document.getElementById('sleepChart')?.getContext('2d');
      if (ctxSleep) {
        if (chartInstances.sleep) chartInstances.sleep.destroy();
        chartInstances.sleep = new Chart(ctxSleep, {
          type: 'bar',
          data: {
            labels: sleepData.slice(-7).map(d => d.date.slice(5)),
            datasets: [{ label: 'Sommeil (h)', data: sleepData.slice(-7).map(d => d.duration), backgroundColor: '#3b82f6' }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }
    }

    function dailyCheck() {
      // Sauvegarde l'état d'un jour à minuit
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
      const yStr = yesterday.toISOString().split('T')[0];
      if (!taskHistory[yStr]) {
        taskHistory[yStr] = {};
        syncData("metrics", "history", taskHistory);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      // Initialisation locale basique si Firebase absent
      if (!db) {
        try {
          tasks = JSON.parse(localStorage.getItem('prod_tasks')) || [];
          sleepData = JSON.parse(localStorage.getItem('prod_sleep')) || [];
          napData = JSON.parse(localStorage.getItem('prod_naps')) || [];
          sportData = JSON.parse(localStorage.getItem('prod_sport')) || [];
          taskHistory = JSON.parse(localStorage.getItem('prod_history')) || {};
        } catch(e){}
      }
      renderCalendar();
      renderTasks();
      setInterval(dailyCheck, 60000);
    });
  </script>
</head>
<body class="p-4 bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">

  <div class="max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-xl font-bold">Productivité Professionnelle & Athlète</h1>
        <p class="text-xs text-slate-500" id="calendarTitle"></p>
      </div>
      <button class="btn-primary" onclick="openTaskModal()">➕ Configurer Tâche</button>
    </header>

    <div class="flex justify-between gap-1 card mb-6 overflow-x-auto py-2" id="calendarTimeline"></div>

    <nav class="flex gap-2 mb-6">
      <button class="tab-btn active" data-tab="tasks" onclick="switchTab('tasks')">📋 Tâches</button>
      <button class="tab-btn" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Métriques & Sommeil</button>
    </nav>

    <section id="tab-tasks" class="space-y-4">
      <div id="taskList" class="space-y-2"></div>
    </section>

    <section id="tab-dashboard" class="hidden space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="card">
          <h3 class="font-bold mb-2 text-sm">😴 Enregistrer Sommeil Nocturne</h3>
          <div class="flex gap-2 mb-4">
            <input type="time" id="bedTime" />
            <input type="time" id="wakeTime" />
            <button class="btn-primary text-xs" onclick="addSleep()">OK</button>
          </div>
          <div class="chart-container"><canvas id="sleepChart"></canvas></div>
        </div>

        <div class="card">
          <h3 class="font-bold mb-2 text-sm">💤 Siestes Récupération</h3>
          <div class="flex gap-2 mb-4">
            <input type="time" id="napStart" />
            <input type="number" id="napDuration" placeholder="min" class="w-20" />
            <button class="btn-primary text-xs" onclick="addNap()">OK</button>
          </div>
          <div class="chart-container"><canvas id="napChart"></canvas></div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 text-center">
        <div class="card"><p class="text-xl font-bold" id="avgSleepDuration">--</p><span class="text-xs text-slate-500">Moy. Sommeil</span></div>
        <div class="card"><p class="text-xl font-bold" id="avgNapDuration">--</p><span class="text-xs text-slate-500">Moy. Sieste</span></div>
      </div>
    </section>
  </div>

  <div id="taskModal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="font-bold text-lg mb-4">⚙️ Paramétrer un Programme</h3>
      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold block mb-1">Nom (Ex: Push Day, Jeûne Sunnah)</label>
          <input type="text" id="taskName" class="w-full" placeholder="Entrez le titre..." />
        </div>
        <div>
          <label class="text-xs font-bold block mb-1">Fréquence & Type</label>
          <select id="taskType" class="w-full" onchange="onTypeChange()">
            <option value="green">🟢 Quotidienne (Chaque jour)</option>
            <option value="yellow">🟡 Hebdomadaire (Objectif Hebdo Flottant)</option>
            <option value="orange">🟠 Mensuelle (Objectif Mensuel / Jours spécifiques)</option>
            <option value="red">🔴 Unique / RDV Précis</option>
          </select>
        </div>
        
        <div id="quotaField" class="hidden">
          <label class="text-xs font-bold block mb-1">Nombre d'occurrences attendues (Quota)</label>
          <input type="number" id="taskQuotaValue" class="w-full" placeholder="Ex: 4" min="1" />
        </div>

        <div id="daySelectionField" class="hidden">
          <label class="text-xs font-bold block mb-1">Restreindre à un jour saint / fixe ?</label>
          <select id="taskSpecificDay" class="w-full">
            <option value="all">N'importe quel jour du mois</option>
            <option value="monday">Lundi uniquement</option>
            <option value="thursday">Jeudi uniquement</option>
          </select>
        </div>

        <div>
          <label class="text-xs font-bold block mb-1">Découpage Structure</label>
          <select id="taskStructure" class="w-full" onchange="document.getElementById('subContainer').classList.toggle('hidden', this.value !== 'complex')">
            <option value="simple">Action unique (1 case)</option>
            <option value="complex">Sous-étapes (Plusieurs sous-cases)</option>
          </select>
        </div>
        <div id="subContainer" class="hidden">
          <input type="text" id="subcaseNames" class="w-full" placeholder="Ex: Sobh, Dohr, Asr ou Exercice1, Exercice2" />
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <button class="tab-btn" onclick="closeTaskModal()">Fermer</button>
        <button class="btn-primary" onclick="saveTask()">Enregistrer le programme</button>
      </div>
    </div>
  </div>

</body>
</html>
