<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Productivité Professionnel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            redTask: '#ef4444',
            orangeTask: '#f97316',
            yellowTask: '#eab308',
            greenTask: '#22c55e',
            blueTask: '#3b82f6',
          }
        }
      }
    };
  </script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.25rem; }
    
    /* Boutons de sous-séances et sous-tâches */
    .subcase-btn { padding: 0.5rem 0.75rem; border: 2px solid var(--border); border-radius: 0.5rem; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; background: #0f172a; }
    
    /* Couleurs vives quand validé sans rature */
    .subcase-btn.active-green { background: #22c55e !important; color: #000 !important; border-color: #22c55e !important; }
    .subcase-btn.active-yellow { background: #eab308 !important; color: #000 !important; border-color: #eab308 !important; }
    .subcase-btn.active-orange { background: #f97316 !important; color: #fff !important; border-color: #f97316 !important; }
    .subcase-btn.active-blue { background: #3b82f6 !important; color: #fff !important; border-color: #3b82f6 !important; }
    
    /* État vif pour ligne complète */
    .task-vif-green { background: #22c55e/20 !important; border-left: 5px solid #22c55e !important; }
    .task-vif-blue { background: #3b82f6/20 !important; border-left: 5px solid #3b82f6 !important; }

    .tab-btn { padding: 0.6rem 1.2rem; border-radius: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #1e293b; border: 1px solid #334155; color: var(--muted); }
    .tab-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    
    .btn-primary { background: #3b82f6; color: #fff; padding: 0.5rem 1.25rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #2563eb; }
    
    input, select { background: #0f172a; color: var(--text); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem 0.75rem; outline: none; }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    
    .task-item { padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--border); background: #1e293b; margin-bottom: 0.5rem; transition: all 0.2s; }
    
    /* Calendrier Widget */
    .widget-calendar { background: #151f32; border: 1px solid #24344d; border-radius: 1.5rem; padding: 1.5rem; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; text-align: center; }
    .calendar-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
    .calendar-cell:hover { background: #24344d; }
    .calendar-cell.active { background: #e15b34; color: white; }
    .calendar-cell.muted { color: #475569; }
    
    .hidden { display: none !important; }
  </style>

  <script>
    let tasks = [];
    let sleepData = [];
    let napData = [];
    let taskHistory = {};
    
    let currentCalDate = new Date(); 
    let selectedDate = getTodayStr(); 

    function getTodayStr() { return new Date().toISOString().split('T')[0]; }
    
    function formatDateFr(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
      ['tasks','dashboard','archives'].forEach(t => document.getElementById('tab-' + t)?.classList.add('hidden'));
      document.getElementById('tab-' + tab)?.classList.remove('hidden');
      if (tab === 'archives') renderArchives();
    }

    // --- CALENDRIER AGENDA ---
    function renderWidgetCalendar() {
      const year = currentCalDate.getFullYear();
      const month = currentCalDate.getMonth();
      document.getElementById('calendarMonthLabel').textContent = new Date(year, month).toLocaleDateString('fr-FR', { month: 'short', year: 'numeric' });

      const grid = document.getElementById('calendarGridCells');
      if (!grid) return;
      grid.innerHTML = '';

      const firstDayIdx = (new Date(year, month, 1).getDay() + 6) % 7; 
      const totalDays = new Date(year, month + 1, 0).getDate();
      const prevTotalDays = new Date(year, month, 0).getDate();

      for (let i = firstDayIdx - 1; i >= 0; i--) {
        let cell = document.createElement('div');
        cell.className = 'calendar-cell muted';
        cell.textContent = prevTotalDays - i;
        grid.appendChild(cell);
      }

      for (let d = 1; d <= totalDays; d++) {
        let cell = document.createElement('div');
        let currentString = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        cell.className = 'calendar-cell';
        if (currentString === selectedDate) cell.classList.add('active');
        cell.textContent = d;
        cell.onclick = () => {
          selectedDate = currentString;
          renderWidgetCalendar();
          renderTasks();
        };
        grid.appendChild(cell);
      }
      document.getElementById('selectedDayTitle').textContent = formatDateFr(selectedDate);
    }

    function changeMonth(direction) {
      currentCalDate.setMonth(currentCalDate.getMonth() + direction);
      renderWidgetCalendar();
    }

    // --- ENGINE DE RENDU DES TÂCHES ---
    function renderTasks() {
      const container = document.getElementById('taskList');
      if (!container) return;
      container.innerHTML = '';

      const todayStr = getTodayStr();

      // Filtrage intelligent selon les exigences strictes
      const filtered = tasks.filter(t => {
        // Tâche Bleue (Flottante) : Reste affichée partout tant qu'elle n'est pas complétée, se fige au jour validé
        if (t.type === 'blue') {
          if (t.doneDate) return t.doneDate === selectedDate; // Figée au jour de complétion
          return selectedDate >= t.createdAt; // Visible du jour de création jusqu'au futur tant que non faite
        }
        // Tâche Rouge (Unique/RDV)
        if (t.type === 'red') return t.date === selectedDate;
        // Tâche Verte (Quotidienne)
        if (t.type === 'green') return selectedDate >= t.createdAt;
        // Tâches Hebdo / Mensuelles (Sport, Pratiques)
        if (t.type === 'yellow' || t.type === 'orange') {
          if (t.specificDay && t.specificDay !== 'all') {
            const dayName = new Date(selectedDate + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
            if (dayName !== t.specificDay) return false;
          }
          return selectedDate >= t.createdAt;
        }
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center text-slate-400 p-4">Aucun programme ou tâche pour ce jour.</div>`;
        return;
      }

      filtered.forEach(task => {
        const el = document.createElement('div');
        el.className = 'task-item flex flex-col gap-3';
        
        // Couleur de bordure par défaut
        el.style.borderLeft = '5px solid ' + TYPE_COLORS[task.type];

        let contentHtml = '';

        // CAS 1 : Tâche Verte (Quotidienne classique)
        if (task.type === 'green') {
          const isDone = task.doneDates && task.doneDates.includes(selectedDate);
          if (isDone) el.classList.add('bg-emerald-500/10', 'border-emerald-500');
          
          contentHtml = `
            <div class="flex justify-between items-center w-full">
              <span class="font-bold text-lg text-slate-100">${task.name}</span>
              <div class="flex gap-2">
                <button class="subcase-btn ${isDone ? 'active-green' : ''}" onclick="toggleDailyTask('${task.id}')">
                  ${isDone ? '✨ Complétée' : '✓ Valider'}
                </button>
                <button class="text-slate-500 hover:text-red-400 px-1" onclick="deleteTask('${task.id}')">🗑️</button>
              </div>
            </div>
          `;
        }

        // CAS 2 : Tâche Bleue (Flottante définitive)
        else if (task.type === 'blue') {
          const isDone = !!task.doneDate;
          if (isDone) el.classList.add('bg-blue-600/10', 'border-blue-500');

          contentHtml = `
            <div class="flex justify-between items-center w-full">
              <div>
                <span class="font-bold text-lg text-slate-100">${task.name}</span>
                <span class="text-xs block text-blue-400 font-medium">${isDone ? `Accomplie le ${task.doneDate}` : '📌 Tâche flottante active'}</span>
              </div>
              <div class="flex gap-2">
                <button class="subcase-btn ${isDone ? 'active-blue' : ''}" ${isDone ? 'disabled' : ''} onclick="toggleBlueTask('${task.id}')">
                  ${isDone ? '🔒 Archivée' : '✓ Remplir'}
                </button>
                <button class="text-slate-500 hover:text-red-400 px-1" onclick="deleteTask('${task.id}')">🗑️</button>
              </div>
            </div>
          `;
        }

        // CAS 3 : Tâches à Composants (Cycles Sportifs Hebdo, Prières Composées)
        else {
          let itemsHtml = '<div class="flex gap-2 flex-wrap mt-1">';
          
          if (task.quotaArr && task.quotaArr.length > 0) {
            task.quotaArr.forEach((q, idx) => {
              // Vérification de validation
              const isChecked = q.doneDates && q.doneDates.includes(selectedDate);
              let cls = '';
              if (isChecked) {
                if (task.type === 'yellow') cls = 'active-yellow';
                if (task.type === 'orange') cls = 'active-orange';
                if (task.type === 'green') cls = 'active-green';
              }

              itemsHtml += `
                <button class="subcase-btn ${cls}" onclick="toggleSubItem('${task.id}', ${idx})">
                  ${q.name} ${isChecked ? '⚡' : ''}
                </button>
              `;
            });
          }
          itemsHtml += '</div>';

          contentHtml = `
            <div class="flex justify-between items-center w-full">
              <div>
                <span class="font-bold text-lg text-slate-100">${task.name}</span>
                <span class="text-xs block text-slate-400">
                  ${task.isContinuous ? '🔄 Cycle Continu Infini' : '⚙️ Objectifs du bloc'}
                </span>
              </div>
              <button class="text-slate-500 hover:text-red-400" onclick="deleteTask('${task.id}')">🗑️</button>
            </div>
            ${itemsHtml}
          `;
        }

        el.innerHTML = contentHtml;
        container.appendChild(el);
      });
    }

    // --- ACTIONS DE VALIDATION ---
    function toggleDailyTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      if (!task.doneDates) task.doneDates = [];

      const idx = task.doneDates.indexOf(selectedDate);
      if (idx > -1) task.doneDates.splice(idx, 1);
      else task.doneDates.push(selectedDate);

      saveHistoryState();
      saveLocalStorage();
      renderTasks();
    }

    function toggleBlueTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task || task.doneDate) return; 
      
      task.doneDate = selectedDate; // Se fige définitivement à la date du clic
      saveHistoryState();
      saveLocalStorage();
      renderTasks();
    }

    function toggleSubItem(taskId, itemIdx) {
      const task = tasks.find(t => t.id === taskId);
      if (!task || !task.quotaArr) return;

      let subItem = task.quotaArr[itemIdx];
      if (!subItem.doneDates) subItem.doneDates = [];

      const dIdx = subItem.doneDates.indexOf(selectedDate);
      if (dIdx > -1) {
        subItem.doneDates.splice(dIdx, 1);
      } else {
        subItem.doneDates.push(selectedDate);
      }

      // RÈGLE UNIQUE 1 : Gestion du Cycle Sportif Continu Infini
      if (task.isContinuous && itemIdx === task.quotaArr.length - 1) {
        alert("🔄 Cycle terminé ! Réinitialisation automatique du cycle pour la prochaine séance.");
        task.quotaArr.forEach(q => q.doneDates = []);
      }

      saveHistoryState();
      saveLocalStorage();
      renderTasks();
    }

    // --- SAUVEGARDE ET TUNNEL DE QUESTIONS ---
    function onTypeChange() {
      const type = document.getElementById('taskType').value;
      
      // Gestion des affichages du tunnel de configuration
      document.getElementById('quotaSection').classList.toggle('hidden', type === 'blue' || type === 'red' || type === 'green');
      document.getElementById('continuousSection').classList.toggle('hidden', type !== 'yellow');
      document.getElementById('composedTaskSection').classList.toggle('hidden', type !== 'green');
    }

    function generateQuotaInputs() {
      const num = parseInt(document.getElementById('quotaValue').value) || 0;
      const container = document.getElementById('quotaNamesFields');
      container.innerHTML = '';
      if (num <= 0) return;

      for (let i = 0; i < num; i++) {
        let label = i === 0 ? "Nom de la S1 (ex: Push)" : i === 1 ? "Nom de la S2 (ex: Pull)" : i === 2 ? "Nom de la S3 (ex: Legs)" : `Séance ${i+1}`;
        container.innerHTML += `
          <div class="mt-2">
            <label class="text-xs text-slate-400 block">${label}</label>
            <input type="text" id="subName_${i}" class="w-full text-xs mt-1" placeholder="Ex: Push Athlète" />
          </div>
        `;
      }
    }

    function saveTask() {
      const name = document.getElementById('taskName').value.trim();
      const type = document.getElementById('taskType').value;
      if (!name) return;

      let quotaArr = [];
      let isContinuous = false;

      // 1. Gestion des tâches composées quotidiennes (Ex: Les 5 prières)
      if (type === 'green' && document.getElementById('isComposed').value === 'yes') {
        const customNodes = document.getElementById('composedNodes').value.split(',').map(s => s.trim());
        customNodes.forEach(node => {
          if(node) quotaArr.push({ name: node, doneDates: [] });
        });
      }

      // 2. Gestion des cycles de sport complexes (Hebdo/Mensuels)
      if ((type === 'yellow' || type === 'orange')) {
        const num = parseInt(document.getElementById('quotaValue').value) || 0;
        for (let i = 0; i < num; i++) {
          const sName = document.getElementById(`subName_${i}`)?.value.trim() || `Séance ${i+1}`;
          quotaArr.push({ name: sName, doneDates: [] });
        }
        if (type === 'yellow') {
          isContinuous = (document.getElementById('isContinuousSelect').value === 'yes');
        }
      }

      const newTask = {
        id: 'task_' + Date.now(),
        name,
        type,
        quotaArr,
        isContinuous,
        createdAt: getTodayStr(),
        doneDates: [], // Pour le vert standard
        doneDate: null // Pour le bleu flottant
      };

      tasks.push(newTask);
      saveLocalStorage();
      closeModal();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveLocalStorage();
      renderTasks();
    }

    function saveHistoryState() {
      if (!taskHistory[selectedDate]) taskHistory[selectedDate] = [];
      localStorage.setItem('prod_history', JSON.stringify(taskHistory));
    }

    function renderArchives() {
      const container = document.getElementById('archiveContent');
      if (!container) return;
      container.innerHTML = '<h4 class="font-bold mb-3 text-slate-100">Ligne temporelle des validations</h4>';
      
      const doneBlues = tasks.filter(t => t.type === 'blue' && t.doneDate);
      if(doneBlues.length === 0) {
        container.innerHTML += '<p class="text-xs text-slate-400">Aucune tâche flottante verrouillée pour le moment.</p>';
        return;
      }
      doneBlues.forEach(b => {
        container.innerHTML += `
          <div class="p-2 border-b border-slate-700 flex justify-between text-xs">
            <span class="text-blue-400 font-bold">📌 ${b.name}</span>
            <span class="text-slate-400">Fichée au : ${b.doneDate}</span>
          </div>
        `;
      });
    }

    function saveLocalStorage() { localStorage.setItem('prod_tasks', JSON.stringify(tasks)); }
    function openModal() { document.getElementById('taskModal').classList.add('open'); onTypeChange(); }
    function closeModal() { document.getElementById('taskModal').classList.remove('open'); }

    window.addEventListener('DOMContentLoaded', () => {
      try {
        tasks = JSON.parse(localStorage.getItem('prod_tasks')) || [];
        taskHistory = JSON.parse(localStorage.getItem('prod_history')) || {};
      } catch(e){}
      renderWidgetCalendar();
      renderTasks();
    });

    const TYPE_COLORS = { red: '#ef4444', orange: '#f97316', yellow: '#eab308', green: '#22c55e', blue: '#3b82f6' };
  </script>
</head>
<body class="p-4 md:p-6">

  <div class="max-w-3xl mx-auto space-y-6">
    
    <header class="flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black tracking-tight text-slate-100">WORKSPACE PRODUCTIVITÉ</h1>
        <p class="text-xs text-orange-400 font-medium" id="selectedDayTitle"></p>
      </div>
      <button class="btn-primary" onclick="openModal()">➕ Nouveau Programme</button>
    </header>

    <!-- CALENDRIER DESIGN RETRAVAILLÉ -->
    <div class="widget-calendar">
      <div class="flex justify-between items-center mb-4 px-1">
        <h3 class="text-lg font-bold text-slate-200" id="calendarMonthLabel">juil. 2026</h3>
        <div class="flex gap-3">
          <button onclick="changeMonth(-1)" class="text-sm font-bold bg-slate-800 px-2 py-1 rounded hover:bg-slate-700">❮</button>
          <button onclick="changeMonth(1)" class="text-sm font-bold bg-slate-800 px-2 py-1 rounded hover:bg-slate-700">❯</button>
        </div>
      </div>
      <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-slate-500 mb-2 uppercase">
        <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
      </div>
      <div class="calendar-grid" id="calendarGridCells"></div>
    </div>

    <!-- ONGLETS -->
    <nav class="flex gap-2">
      <button class="tab-btn active" data-tab="tasks" onclick="switchTab('tasks')">📋 Plan du Jour</button>
      <button class="tab-btn" data-tab="archives" onclick="switchTab('archives')">📁 Archives Définitives</button>
    </nav>

    <!-- INTERFACE PRINCIPALE DES TÂCHES -->
    <section id="tab-tasks" class="space-y-2">
      <div id="taskList" class="space-y-3"></div>
    </section>

    <!-- INTERFACE DES ARCHIVES -->
    <section id="tab-archives" class="hidden card"></section>

  </div>

  <!-- TUNNEL DE CONFIGURATION AVANCÉ -->
  <div id="taskModal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="font-bold text-lg mb-4 text-slate-100">⚙️ Tunnel de Configuration</h3>
      
      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold text-slate-400 block mb-1">Intitulé du programme / de l'action</label>
          <input type="text" id="taskName" class="w-full" placeholder="Ex: Entraînement Force, Prières Sacrées" />
        </div>

        <div>
          <label class="text-xs font-bold text-slate-400 block mb-1">Type de structure</label>
          <select id="taskType" class="w-full" onchange="onTypeChange()">
            <option value="green">🟢 Quotidienne (Standard ou Composée)</option>
            <option value="blue">🔵 Bleue (Flottante définitive sans rature)</option>
            <option value="yellow">🟡 Hebdomadaire (Sport / Cycle)</option>
            <option value="orange">🟠 Mensuelle (Dates fixes)</option>
            <option value="red">🔴 Unique (Date spécifique)</option>
          </select>
        </div>

        <!-- Question exclusive Tâches Composées Quotidiennes (Ex: Prières) -->
        <div id="composedTaskSection" class="hidden border-l-2 border-green-500 pl-3 space-y-2">
          <label class="text-xs font-bold text-slate-300 block">Est-ce une tâche composée de plusieurs étapes ?</label>
          <select id="isComposed" class="w-full">
            <option value="no">Non, c'est une action simple</option>
            <option value="yes">Oui, elle a plusieurs sous-étapes</option>
          </select>
          <label class="text-xs text-slate-400 block mt-1">Séparez les sous-étapes par une virgule :</label>
          <input type="text" id="composedNodes" class="w-full text-xs" value="Subh, Dhuhr, Asr, Maghrib, Isha" />
        </div>

        <!-- Question exclusive aux Cycles Hebdomadaires -->
        <div id="continuousSection" class="hidden border-l-2 border-yellow-500 pl-3 space-y-2">
          <label class="text-xs font-bold text-slate-300 block">Fonctionnement en cycle continu ?</label>
          <select id="isContinuousSelect" class="w-full">
            <option value="yes">Oui (Si S3 cochée ➔ Revient à S1 immédiatement)</option>
            <option value="no">Non (Reste figé sur la semaine complète)</option>
          </select>
        </div>

        <!-- Section Quotas & Noms pour les listes et séances de sport -->
        <div id="quotaSection" class="hidden border-l-2 border-blue-500 pl-3 space-y-2">
          <label class="text-xs font-bold text-slate-300 block">Nombre d'occurrences ou séances du cycle :</label>
          <input type="number" id="quotaValue" class="w-full" min="1" placeholder="Ex: 3" oninput="generateQuotaInputs()" />
          <div id="quotaNamesFields" class="space-y-1"></div>
        </div>
      </div>

      <div class="flex justify-end gap-2 mt-6">
        <button class="tab-btn bg-transparent" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveTask()">Valider & Déployer</button>
      </div>
    </div>
  </div>

</body>
</html>
